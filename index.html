<!doctype html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ordeal</title>
	<link rel="stylesheet" href="style.css" />
	<link rel="icon" href="Assets/icons/icon.png" type="image/png"/>
</head>

<body>

	<div class="layout max-width">

		<!-- left card -->
		<aside class="sidebar card">
			<header class="layout_1">
				<h1 class="title">Ordeal To Do</h1>
				<button type="button" class="field click" id="toggle-calendar">Calendar</button>
			</header>
			<hr/>

			<div class="board" id="Board-list"></div>

			<hr/>
			<div class="layout_2">
				<input type="text" placeholder="List title" class="field task click" id="Input-list" />
				<button type="button" class="field click icon-button" id="Add-list">+</button>
			</div>
		</aside>

		<!-- center card -->
		<main class="main card">
			<div class="layout_1">
				<!-- List title is supposed to be editable and then change the active list title you are working on -->
				<h2 class="title" id="Current-list-title" contenteditable="true"> </h2>
				<div class="layout_1">
					<button type="button" class="field click" id="Order" disabled>Order</button>
					<button type="button" class="field click" id="Filter" disabled>Filter</button>
				</div>
			</div>
			<hr/>

			<div class="board" id="Board-task"></div>
			<hr/>
			
			<button type="button" class="field click task layout_1" id="Btn-social-points" disabled>
				<span>Social points</span> 
				<span id="progress-percent">0</span>
			</button>
		</main>

		<!-- right card -->
		<aside class="details card">
			<div class="layout_1">
				<div class="layout_2">
					<button type="button" class="field click" id="create">Create</button>
					<button type="button" class="field click" id="remove">Remove</button>
				</div>
				<div class="layout_2">
					<button type="button" class="field click" id="group">Group</button>
					<button type="button" class="field click" id="date">Date</button>
				</div>
			</div>
			<hr />
			
			<div class="layout_3">
				<textarea class="field task dark" id="Title-task" maxlength="100" style="font-weight: bold;" placeholder="Task title"></textarea>
				<textarea id="Detail-task" maxlength="600" class="field task dark" style="font-weight: bold;" placeholder="Task description"></textarea>
			</div>
			<hr />
			
			<div class="layout_2">
				<button type="button" class="field click task" style="width: 100%;" disabled> Assign task to </button>
				<button type="button" class="field click icon-button" id="Btn-task-date" disabled>R1</button>
				<button type="button" class="field click icon-button" id="Btn-task-repeat" disabled>R2</button>
			</div>
		</aside>

		<section class="card">
			<button type="button" class="field click task layout_1" disabled>
				<span>Chat</span>
			</button>
		</section>

		<section class="card">
			<button type="button" class="field click task layout_1" id="Btn-account-stats" disabled>
				<span>Account stats</span> 
			</button>
		</section>

		<section class="card">
			<div class="layout_2">
				<button type="button" class="field click task" id="Btn-config" style="width: 100%;" disabled> Configuration </button>
				<button type="button" class="field click icon-button" id="Btn-account" disabled>A</button>
				<button type="button" class="field click icon-button" id="Btn-friends" disabled>F</button>
			</div>
		</section>
		
		<!-- Calendar section -->
		<section class="card" id="calendar"></section>

	</div>

	<!-- Modal window for adding groups to the tasks -->
	<div id="Modal-group" class="modal">
		<div class="card modal-content">
			<div class="layout_1">
				<h2 class="title">Groups</h2>
				<button type="button" class="field click" id="Close-group">Close</button>
			</div>
			<hr/>
			<div class="board" id="Board-group" style="height: 250px;"></div>
			<hr/>
			<div class="layout_2">
				<input type="text" placeholder="Group name" class=" field task click" id="Input-group"/>
				<button type="button" class="field click icon-button" id="Add-group">+</button>
			</div>
		</div>
	</div>

	<!-- Modal window for assigning a date to a task -->
	<div id="Modal-date" class="modal">
		<div class="card modal-content">
			<div class="layout_1">
				<h2 class="title">Set Date</h2>
				<button type="button" class="field click icon-button" id="Close-date">X</button>
			</div>
			<hr/>
			<div class="layout_3">
				<input type="date" class="field task click dark" id="Input-date" style="color-scheme: dark;" />
				<div class="layout_2" style="margin-top: 10px;">
					<button type="button" class="field click" id="Save-date" style="flex-grow: 1;">Save Date</button>
					<button type="button" class="field click" id="Clear-date" style="flex-grow: 1;">Clear Date</button>
				</div>
			</div>
		</div>
	</div>

	<script src="script.js"></script>

</body>
</html>
