<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<link rel="icon" type="image/svg+xml" href="assets/icons/favicon-light.svg" media="(prefers-color-scheme: light)">
	<link rel="icon" type="image/svg+xml" href="assets/icons/favicon-dark.svg" media="(prefers-color-scheme: dark)">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ordeal</title>
	<link rel="stylesheet" href="style.css" />
</head>

<body>

	<!-- Main cards -->
	<div class="layout max-width">

		<!-- left card -->
		<aside class="sidebar card">
			<header class="layout_1">
				<h1 class="title">Ordeal To Do</h1>
				<button class="field click" id="calendar" disabled>Calendar</button>
			</header>
			<hr/>

			<div class="board" id="board-list"></div> <hr/>

			<div class="layout_2">
				<input type="text" placeholder="List title" class="field task click" id="input-list" />
				<button class="field click icon-button" id="add-list">
					<svg viewBox="0 0 24 24" fill="none"> <use href="#icon-add"></use> </svg>
				</button>
			</div>
		</aside>

		<!-- center card -->
		<main class="main card">
			<div class="layout_1">
				<!-- List title is supposed to be editable and then change the active list title you are working on -->
				<h2 class="title" id="current-list-title"> </h2>
				<div class="layout_1">
					<button class="field click" id="order" disabled>Order</button>
					<button class="field click" id="filter" disabled>Filter</button>
				</div>
			</div>
			<hr/>

			<div class="board" id="board-task"></div> <hr/>
			
			<button class="field click task layout_1" id="btn-social-points" disabled>
				<span>Social points</span> 
				<span id="progress-percent">0</span>
			</button>
		</main>

		<!-- right card -->
		<aside class="details card">
			<div class="layout_1">
				<div class="layout_2">
					<button class="field click" id="create">Create</button>
					<button class="field click" id="remove">Remove</button>
				</div>
				<div class="layout_2">
					<button class="field click" id="group">Group</button>
					<button class="field click" id="date">Date</button>
				</div>
			</div>
			<hr/>
			
			<div class="board">
				<textarea class="field task dark" id="title-task" maxlength="100" style="font-weight: bold;"></textarea>
				<textarea id="detail-task" maxlength="600" class="field task dark" style="font-weight: bold;" placeholder="Task description"></textarea>
			</div>
			<hr/>
			
			<div class="layout_2">
				<button class="field click task" style="width: 100%;" disabled>Assign task to</button>
				<button class="field click icon-button" id="reminder">
					<svg viewBox="0 0 24 24" fill="none"> <use href="#icon-reminder"></use> </svg>
				</button>
				<button class="field click icon-button" id="repeat" disabled>
					<svg viewBox="0 0 24 24" fill="none"> <use href="#icon-repeat"></use> </svg>
				</button>
			</div>
		</aside>

		<!-- left botton card -->
		<section class="card">
			<button class="field click task layout_1" id="btn-chat" disabled>
				<span>Chat</span>
			</button>
		</section>

		<!-- center botton card -->
		<section class="card">
			<button class="field click task layout_1" id="Btn-account-stats" disabled>
				<span>Account stats</span> 
			</button>
		</section>

		<!-- right botton card -->
		<section class="card">
			<div class="layout_2">
				<button class="field click task" id="btn-config" style="width: 100%;" disabled>Configuration</button>
				<button class="field click icon-button" id="btn-account" disabled>
					<svg viewBox="0 0 24 24" fill="none"> <use href="#icon-account"></use> </svg>
				</button>
				<button class="field click icon-button" id="btn-friends" disabled>
					<svg viewBox="0 0 24 24" fill="none"> <use href="#icon-friends"></use> </svg>
				</button>
			</div>
		</section>

	</div>

	<!-- Modal window for adding groups to the tasks -->
	<div id="modal-group" class="modal">
		<div class="card modal-content">
			<div class="layout_1">
				<h2 class="title">Groups</h2>
				<button class="field click" id="close-group">Close</button>
			</div>
			<hr/>

			<div class="board" id="board-group" style="height: 240px;"></div> <hr/>
			
			<div class="layout_2">
				<input type="text" placeholder="Group name" class=" field task click" id="input-group"/>
				<button class="field click icon-button" id="add-group">
					<svg viewBox="0 0 24 24" fill="none"> <use href="#icon-add"></use> </svg>
				</button>
			</div>
		</div>
	</div>

	<!-- Modal window for assigning a date to a task -->
	<div id="modal-date" class="modal">
		<div class="card modal-content">
			<div class="layout_1">
				<h2 class="title">Set Date</h2>
				<button class="field click" id="close-date">Close</button>
			</div>
			<hr/>
			<div class="layout_2">
				<input type="date" class="field task click dark" id="input-date" onclick="this.showPicker()" />
				<button class="field click icon-button" id="save-date">
					<svg viewBox="0 0 24 24" fill="none"> <use href="#icon-save"></use> </svg>
				</button>
				<button class="field click icon-button" id="clear-date">
					<svg viewBox="0 0 24 24" fill="none"> <use href="#icon-delete"></use> </svg>
				</button>
			</div>
		</div>
	</div>

	<!-- Modal window for group filtering -->
	<div id="modal-filter" class="modal">
		<div class="card modal-content">
			<div class="layout_1">
				<h2 class="title">Filter</h2>
				<button class="field click" id="close-filter">Close</button>
			</div>
			<hr/>
			<div class="board" id="board-filter" style="height: 240px;"></div>
			<hr/>
			<div class="layout_2">
				<button class="field click task" style="width: 100%;">Clear filters</button>
			</div>
		</div>
	</div>

	<!-- Javascript section, this will use the type=module atribute later when necessary -->
	<script src="js/elements.js"></script>
	<script src="js/state.js"></script>
	<script src="js/utility.js"></script>
	<script src="js/render.js"></script>
	<script src="js/listeners.js"></script>
	<script src="js/lists.js"></script>

	<!-- Modal behaviour -->
	<script src="js/modal-group.js"></script>
	<script src="js/modal-date.js"></script>
	<script src="js/modal-filter.js"></script>

	<!-- Shortcuts -->
	<script src="js/shortcuts.js"></script>

	<!-- Initial page setup -->
	<script src="js/app.js"></script>

</body>
</html>
